name: Go CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 🐹 Go 测试与构建 (Windows)
    runs-on: windows-latest   # 改为 Windows 环境
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Go 环境 ⚙️
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'   # 与本地版本一致
          cache: true

      - name: 下载依赖 📦
        run: go mod download

      - name: 构建二进制文件 🏗️
        run: go build -o bin/mdt-server.exe ./cmd/mdt-server

      - name: 执行测试 ✅
        run: go test -v ./...

      - name: 生成覆盖率报告 📊
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html

      - name: 归档构建产物 📁
        uses: actions/upload-artifact@v4
        with:
          name: mdt-server-windows
          path: bin/mdt-server.exe
