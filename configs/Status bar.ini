; 服务器状态栏配置
; 使用 infoPopup 在左上区域持续刷新显示，可贴近下一波下方
; 1 = 开启，0 = 关闭
; 可用占位符: {server_name} {cpu_percent} {memory_mb} {players} {qq_group} {message} {uptime} {current_map} {game_time} {player_name}

[status_bar]
enabled = 1 ; 状态栏总开关
refresh_interval_sec = 2 ; 刷新周期（秒）
popup_duration_ms = 2200 ; 单次显示持续时间（毫秒），建议略大于刷新周期
align = top_left ; 对齐方式：top_left / top / center / bottom_right 等
top = 155 ; 顶部偏移，156 常见状态栏位置
left = 0 ; 左侧偏移
bottom = 0 ; 底部偏移
right = 0 ; 右侧偏移
popup_id = server-status-bar ; 保留字段，当前使用无 ID popup 包
header_enabled = 1 ; 标题行开关
header_text = [accent]欢迎来到[#F285D1]镜[#F285E3]像[#E59AFF]物[#CC99FF]语[] ; 标题行内容
server_name_enabled = 0 ; 服务器名称行开关
server_name_format = [green]服务器: [white]{server_name}[] ; 服务器名称行模板
performance_enabled = 1 ; CPU/内存行开关
performance_format = [green]性能: [white]CPU {cpu_percent}%[] [white]内存 {memory_mb} MB[] ; CPU/进程内存行模板
current_map_enabled = 1 ; 当前地图行开关
current_map_format = [green]当前地图: [white]{current_map}[] ; 当前地图行模板
game_time_enabled = 1 ; 本局游戏时间行开关
game_time_format = [green]本局时间: [white]{game_time}[] ; 本局游戏时间行模板
player_count_enabled = 1 ; 在线人数行开关
player_count_format = [green]在线人数: [white]{players}[] ; 在线人数行模板
welcome_enabled = 1 ; 欢迎语行开关
welcome_format = [gold]欢迎玩家 {player_name} 来到镜像物语[] ; 欢迎语行模板
qq_group_enabled = 1 ; QQ群行开关
qq_group_text = 333641130 ; QQ群号码或说明
qq_group_format = [green]QQ群: [white]{qq_group}[] ; QQ群行模板
custom_message_enabled = 1 ; 自定义文案行开关
custom_message_text = 宝宝 这不是一个原版服务端 求求你加群吧 ; 自定义文案内容
custom_message_format = [gold]{message}[] ; 自定义文案行模板