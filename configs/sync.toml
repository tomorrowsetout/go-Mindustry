# 同步配置
# entity_ms 越小，玩家与单位同步越频繁；state_ms 越小，状态校正越频繁。

[sync]
# 实体快照同步间隔，单位毫秒。
entity_ms = 200
# 状态快照同步间隔，单位毫秒。
state_ms = 200
# UDP 失败后的重试次数。
udp_retry_count = 2
# UDP 每次重试延迟，单位毫秒。
udp_retry_delay_ms = 5
# UDP 不可用时是否回退到 TCP。
udp_fallback_tcp = true
# 是否允许在 block sync 时回退使用地图内联同步数据。
use_map_sync_data_fallback = false
# 是否输出 block sync 详细调试日志；默认建议关闭，只在排查同步问题时临时开启。
block_sync_logs_enabled = false
