# 个性化显示配置
# 控制启动报告、控制台展示、玩家名前后缀等显示行为。

[personalization]
# 是否显示启动检查报告。
startup_report_enabled = true
# 是否显示地图载入详情。
map_load_details_enabled = true
# 是否在启动时打印单位 ID 列表。
unit_id_list_enabled = true
# 是否在启动时额外显示当前地图一行。
startup_current_map_line_enabled = true
# 是否显示控制台欢迎信息。
console_intro_enabled = true
# 欢迎信息中是否显示服务器名。
console_intro_server_name_enabled = true
# 欢迎信息中是否显示当前地图。
console_intro_current_map_enabled = true
# 欢迎信息中是否显示监听地址。
console_intro_listen_addr_enabled = true
# 欢迎信息中是否显示本机局域网 IP。
console_intro_local_ip_enabled = true
# 欢迎信息中是否显示 API 信息。
console_intro_api_enabled = true
# 欢迎信息中是否显示帮助提示。
console_intro_help_hint_enabled = true
# 启动完成后是否打印帮助摘要。
startup_help_enabled = true
# 玩家进出服务器时是否广播聊天提示。
join_leave_chat_enabled = true
# 是否启用玩家名字颜色。
player_name_color_enabled = true
# 玩家名统一前缀。
player_name_prefix = ""
# 玩家名统一后缀。
player_name_suffix = ""
# 是否启用绑定状态前缀。
player_bind_prefix_enabled = true
# 已绑定玩家的前缀文本。
player_bound_prefix = "[green]（已绑定）[]"
# 未绑定玩家的前缀文本。
player_unbound_prefix = "[scarlet]（未绑定）[]"
# 是否启用玩家称号显示。
player_title_enabled = true
# 玩家身份信息文件路径。
player_identity_file = "json/player_identity.json"
# 玩家绑定信息来源，可选 internal / api。
player_bind_source = "internal"
# 当绑定来源为 api 时使用的查询地址。
player_bind_api_url = ""
# 绑定 API 请求超时，单位毫秒。
player_bind_api_timeout_ms = 1500
# 绑定 API 缓存时间，单位秒。
player_bind_api_cache_sec = 30
# 是否在玩家名后附加连接 ID。
player_conn_id_suffix_enabled = true
# 连接 ID 后缀格式，{id} 会被替换成实际值。
player_conn_id_suffix_format = " [gray]{id}[]"
# 主进程控制台标题，支持 {server_name} / {role} / {process}。
main_console_title = "mdt-server | 主进程 | {server_name}"
# Core2 控制台标题，支持 {server_name} / {role} / {process}。
core2_console_title = "mdt-server | Core2 | IO"
# Core3 控制台标题，支持 {server_name} / {role} / {process}。
core3_console_title = "mdt-server | Core3 | Snapshot"
# Core4 控制台标题，支持 {server_name} / {role} / {process}。
core4_console_title = "mdt-server | Core4 | Policy"
