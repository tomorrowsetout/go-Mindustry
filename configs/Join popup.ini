; 入服公告菜单配置
; [join_popup] 段使用键值对，其余段落按原样保留多行文本
; 文本支持 Mindustry 颜色标签和占位符: {server_name} {player_name} {current_map} {players} {link_url}
; 如果文本里直接换行，游戏内也会按换行显示

[join_popup]
enabled = 1 ; 1 = 开启，0 = 关闭
delay_ms = 300 ; 玩家完成入服同步后延迟多少毫秒再弹出

[title]
[accent]服务器公告[]

[message]
欢迎 [green]{player_name}[] 来到 [white]{server_name}[]
当前地图: [white]{current_map}[]

[announcement]
[accent]服务器公告[]

1. 请遵守服务器规则。
2. 如有问题可先查看快速帮助。
3. 需要联系管理时请使用群或外部链接。

[link_url]
https://github.com/tomorrowsetout/go-Mindustry

[help]
[accent]帮助为分页弹窗[]
第 1 页显示基础指令与投票换图；
第 2 页显示常用与 OP 指令；
第 3 页显示单位控制。
