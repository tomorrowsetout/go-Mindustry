; 投票换图配置
; 控制换图投票持续时间，以及左侧投票状态弹窗刷新频率与位置

[map_vote]
duration_sec = 15 ; 单次投票持续时间（秒）
status_refresh_ms = 1500 ; 左侧投票状态刷新间隔（毫秒）
popup_duration_ms = 1800 ; 单次投票状态弹窗持续时间（毫秒），建议略大于刷新间隔
align = top_left ; 对齐方式：top_left / top / left / center / bottom_right 等
top = 220 ; 顶部偏移
left = 0 ; 左侧偏移
bottom = 0 ; 底部偏移
right = 0 ; 右侧偏移
