; mdt-server 杂物配置文件

[config]
; 配置热刷新周期（秒）
; 服务端会按该间隔重新读取 configs 下各 INI 并应用可热更新项。
reload_interval_sec = 5

; 热重载日志开关
; 0 = 关闭（默认，不打印热重载相关日志）
; 1 = 开启（打印重载成功/失败和提示）
reload_log_enabled = 0

; 网络详细日志开关（控制 tx-udp / incoming packet / tcp accepted 等刷屏日志）
; 0 = 关闭（推荐）
; 1 = 开启
network_verbose_log_enabled = 0

; 连接翻译日志开关（终端中文提示：谁进入/退出了游戏）
; 0 = 关闭
; 1 = 开启（推荐）
translated_conn_log_enabled = 1

; API 分文件名（位于 configs 目录内）
api_file = api.ini

[building]
; 建造/拆除日志总开关
; 0 = 关闭
; 1 = 开启
log_enabled = 1

; 建造日志中文翻译开关
; 0 = 保持原始 buildtrace 风格
; 1 = 使用中文可读日志（包含玩家、坐标、建筑名）
translated_enabled = 1
