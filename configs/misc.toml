# 杂项配置
# 包含数据目录、mods、持久化、脚本与管理文件路径。

[data]
# 事件存储模式，可选 file 等实现值。
mode = "file"
# 事件数据目录。
directory = "data/events"
# 是否启用数据库存储支持。
database_enabled = false
# 数据库连接串，未启用数据库时可留空。
dsn = ""

[paths]
# 资源根目录。
assets_dir = "assets"
# 地图目录。
worlds_dir = "assets/worlds"
# 日志目录。
logs_dir = "logs"

[mods]
# 是否启用模组系统。
enabled = false
# 模组根目录。
directory = "mods"
# Java 运行环境路径，留空表示使用系统默认。
java_home = ""
# JS 模组目录。
js_dir = "mods/js"
# Go 模组目录。
go_dir = "mods/go"
# Node 模组目录。
node_dir = "mods/node"

[persist]
# 是否启用状态持久化。
enabled = true
# 状态文件目录。
directory = "data/state"
# 状态文件名。
file = "server-state.json"
# 自动保存间隔，单位秒。
interval_sec = 30
# 是否同时导出 MSAV 快照。
save_msav = true
# MSAV 快照目录。
msav_dir = "data/snapshots"
# 固定 MSAV 文件名；留空表示按逻辑生成。
msav_file = ""

[script]
# 脚本任务状态文件路径。
file = "data/state/scripts.json"
# 每日手动 GC 时间，格式自行约定；留空表示关闭。
daily_gc_time = ""

[admin]
# OP 管理员列表文件路径。
ops_file = "json/ops.json"
