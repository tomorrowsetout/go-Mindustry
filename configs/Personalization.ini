; 个性化显示配置
; 1 = 开启，0 = 关闭

[personalization]
startup_report_enabled = 1 ; 控制启动报告输出
map_load_details_enabled = 1 ; 控制地图加载详情输出
unit_id_list_enabled = 0 ; 控制单位 ID 列表输出
startup_current_map_line_enabled = 1 ; 控制启动时单独输出 当前地图: ...
console_intro_enabled = 1 ; 控制启动后的信息面板总开关
console_intro_server_name_enabled = 1 ; 控制信息面板中的 服务器名称
console_intro_current_map_enabled = 1 ; 控制信息面板中的 当前地图
console_intro_listen_addr_enabled = 1 ; 控制信息面板中的 监听地址
console_intro_local_ip_enabled = 1 ; 控制信息面板中的 本机IP
console_intro_api_enabled = 1 ; 控制信息面板中的 API地址
console_intro_help_hint_enabled = 1 ; 控制信息面板中的 help all 提示
startup_help_enabled = 1 ; 控制启动时完整帮助列表输出
join_leave_chat_enabled = 1 ; 控制玩家加入/退出时是否向全服发送聊天提示
player_name_color_enabled = 1 ; 控制终端中玩家名称是否保留颜色显示
player_name_prefix =  ; 玩家显示名前缀，可写 Mindustry 颜色标签
player_name_suffix =  ; 玩家显示名后缀，可写 Mindustry 颜色标签
player_bind_prefix_enabled = 1 ; 控制是否在玩家名前显示 已绑定/未绑定 前缀
player_bound_prefix = [green]（已绑定）[] ; 已绑定玩家名前缀，可写 Mindustry 颜色标签
player_unbound_prefix = [scarlet]（未绑定杂鱼~）[] ; 未绑定玩家名前缀，可写 Mindustry 颜色标签
player_title_enabled = 1 ; 控制是否读取 json/player_identity.json 中的自定义头衔
player_identity_file = json/player_identity.json ; 玩家身份配置文件，只读，按 conn_uuid 识别，位于 configs 目录内
player_bind_source = internal ; 玩家绑定识别来源：internal=读取身份文件，api=通过接口查询 yes/no
player_bind_api_url =  ; 绑定查询接口地址，使用 {id} 代替 conn_uuid
player_bind_api_timeout_ms = 1500 ; 绑定查询接口超时（毫秒）
player_bind_api_cache_sec = 30 ; 绑定查询接口缓存秒数，避免频繁请求
player_conn_id_suffix_enabled = 1 ; 控制是否在玩家名后显示 connID/conn_uuid 后缀
player_conn_id_suffix_format = [gray]{id}[] ; 玩家名后缀格式，使用 {id} 代表 connID 或 conn_uuid
