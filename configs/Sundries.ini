; 杂项与日志文件配置
; 这里只控制 logs 目录下日志文件写入内容，不控制终端输出
; 1 = 开启，0 = 关闭

[sundries]
detailed_log_max_mb = 2 ; 英文详细日志单文件最大大小（MB）
detailed_log_max_files = 100 ; 英文详细日志最多保留文件数
net_event_logs_enabled = 1 ; 控制 logs 中的 [NET] 网络事件日志
chat_logs_enabled = 1 ; 控制 logs 中的 [CHAT] 聊天日志
respawn_core_logs_enabled = 1 ; 控制 logs 中的 [RESPAWN] 核心、出生点、未找到核心日志
respawn_unit_logs_enabled = 1 ; 控制 logs 中的 [RESPAWN] 出生单位、建造速度日志
build_place_logs_enabled = 1 ; 控制 logs 中的 [BUILD] 建造了 日志
build_finish_logs_enabled = 1 ; 控制 logs 中的 [BUILD] 完成建造 日志
build_break_start_logs_enabled = 1 ; 控制 logs 中的 [BUILD] 正在拆除 日志
build_break_done_logs_enabled = 1 ; 控制 logs 中的 [BUILD] 拆除了 日志
