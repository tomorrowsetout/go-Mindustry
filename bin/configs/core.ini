; mdt-server 核心配置(core)
;
; dual_core_enabled:
;   0 = 关闭双核调度：网络包在连接 goroutine 内处理，世界 tick 在单独 ticker 中运行
;   1 = 开启双核调度：可分割的网络 IO/包处理在 Core2，多 worker 并发；不可分割的组线程在 Core1
;
[core]
dual_core_enabled = 1

; 内存回收/上限(memory)
;
; limit_mb:
;   0 = 不限制（默认）
;   >0 = 设置 Go 运行时内存上限(近似)，超过后会更激进地触发 GC
;
; startup_max_mb:
;   0 = 不检查（默认）
;   >0 = 启动时如果当前内存使用超过此值，会先尝试 GC/释放内存并打印日志
;
; gc_trigger_mb:
;   0 = 不启用主动内存回收（默认）
;   >0 = 定时检查 heap_alloc，超过触发值则执行 GC（可选 FreeOSMemory）
;
; check_interval_sec:
;   定时检查间隔（秒），默认 5
;
; free_os_memory:
;   0 = 只执行 runtime.GC
;   1 = GC 后额外执行 debug.FreeOSMemory（更激进，可能增加抖动）
;
[memory]
limit_mb = 0
startup_max_mb = 0
gc_trigger_mb = 0
check_interval_sec = 5
free_os_memory = 0
