; 开发模式配置
; 这里只控制终端输出
; 1 = 开启，0 = 关闭

[development]
packet_events_enabled = 0 ; 数据包事件兼容总开关，实际以 recv/send 两项为准
packet_recv_events_enabled = 0 ; 记录 packet_recv 事件
packet_send_events_enabled = 0 ; 记录 packet_send 事件
terminal_player_logs_enabled = 1 ; 控制终端中的 [终端] 玩家进入/退出游戏日志
respawn_core_logs_enabled = 1 ; 控制终端中的 [重生] 核心、出生点、未找到核心日志
respawn_unit_logs_enabled = 1 ; 控制终端中的 [重生] 出生单位、建造速度日志
respawn_packet_logs_enabled = 0 ; 控制终端中的 [重生] 玩家出生包发送日志
build_snapshot_logs_enabled = 0 ; 控制终端中的 [建筑] 快照队列日志
build_place_logs_enabled = 0 ; 控制终端中的 [建筑] 建造了 日志
build_finish_logs_enabled = 1 ; 控制终端中的 [建筑] 完成建造 日志
build_break_start_logs_enabled = 0 ; 控制终端中的 [建筑] 正在拆除 日志
build_break_done_logs_enabled = 1 ; 控制终端中的 [建筑] 拆除了 日志
