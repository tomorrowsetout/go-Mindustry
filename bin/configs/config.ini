; mdt-server 配置总控文件
; 只放全局控制项，不堆放业务配置。

[config]
; 配置热刷新周期（秒）
; 服务端会按该间隔重新读取 configs 下各 INI 并应用可热更新项。
reload_interval_sec = 5

; 热重载日志开关
; 0 = 关闭（默认，不打印热重载相关日志）
; 1 = 开启（打印重载成功/失败和提示）
reload_log_enabled = 0

; 连接翻译日志开关（终端中文提示：谁进入/退出了游戏）
; 0 = 关闭
; 1 = 开启（推荐）
translated_conn_log_enabled = 1

; 公开 conn_uuid 开关
; 0 = 关闭（公开场合继续显示实时 connID）
; 1 = 开启（按 UUID 映射并显示固定 conn_uuid）
public_conn_uuid_enabled = 1

; 公开 conn_uuid 映射文件（位于 configs 目录内）
; 玩家可直接修改这里面的 conn_uuid
public_conn_uuid_file = json/conn_uuid.json

; 是否允许自动创建/自动写入 conn_uuid.json
; 0 = 只读模式，不存在时不创建，新玩家首次进入也不写入
; 1 = 允许自动创建，并为首次进入的玩家生成 conn_uuid
conn_uuid_auto_create = 1

; 是否允许自动创建 player_identity.json
; 0 = 只读模式，不存在时不创建
; 1 = 允许自动创建空白身份文件
player_identity_auto_create = 1

; API 分文件名（位于 configs 目录内）
api_file = api.ini

[building]
; 建造/拆除日志总开关
; 0 = 关闭
; 1 = 开启
log_enabled = 1

; 建造日志中文翻译开关
; 0 = 保持原始 buildtrace 风格
; 1 = 使用中文可读日志（包含玩家、坐标、建筑名）
translated_enabled = 1
